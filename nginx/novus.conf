# ─── Redireciona HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;
    return 301 https://$host$request_uri;
}

# ─── HTTPS principal ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name seudominio.com.br www.seudominio.com.br;

    # Certificado SSL (gerado pelo Certbot automaticamente)
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Limite de upload (fotos de pacientes)
    client_max_body_size 10M;

    # ── API Node.js (/api/* e /uploads/*) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Uploads (fotos dos pacientes) ─────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://localhost:3001;
    }

    # ── WebSocket (atualizações em tempo real) ────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # ── Frontend React (tudo o resto) ────────────────────────────────────────
    location / {
        root  /var/www/novus;
        index index.html;
        # Necessário para React Router funcionar com refresh de página
        try_files $uri $uri/ /index.html;
    }
}
